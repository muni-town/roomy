<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appserver Testing</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      h1 { margin-bottom: 0.25rem; }
      .subtitle { color: #666; margin-top: 0; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 500; }
      input[type="text"] {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.95rem;
        box-sizing: border-box;
      }
      button {
        margin: 0.75rem 0.25rem 0;
        padding: 0.5rem 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.95rem;
      }
      button.primary {
        background: #2563eb;
        color: white;
        border-color: #2563eb;
      }
      button.primary:hover { background: #1d4ed8; }
      button:hover { background: #f5f5f5; }
      button.primary:hover { background: #1d4ed8; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      pre {
        background: #f4f4f5;
        padding: 0.75rem;
        border-radius: 4px;
        overflow-x: auto;
        white-space: pre-wrap;
        font-size: 0.85rem;
      }
      pre.error { background: #fef2f2; color: #991b1b; }
      .steps {
        background: #f0f9ff;
        border: 1px solid #bae6fd;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        margin: 1rem 0;
        font-size: 0.85rem;
      }
      .steps code { background: #e0f2fe; padding: 0.1em 0.3em; border-radius: 3px; }
      .status { color: #666; font-style: italic; }
      #ws-log .error { color: #991b1b; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
